    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }

    /* Section 1 - Judul Nama */
    .section-1 {
      height: auto; /* Otomatis mengikuti isi */

    .product-name {

      justify-content: center;
      align-items: center;

      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

      height: auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .harga-durasi {
      display: flex;
      justify-content: space-between;
      width: 100%;
      align-items: baseline;
      margin-bottom: 45px;
    }

    .harga-durasi .harga {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 10px;
      color: #808080;
    }

    .harga-durasi .durasi {

      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.8px;
      line-height: 15px;
      color: #808080;
    }

    /* Styling untuk Tombol Halaman (Pagination) */
    .pagination-wrapper-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      width: 100%;
    }

      color: #ffffff;
      border: 1px solid #333333;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;

      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }

      background-color: #222222;
      border-color: #555555;
    }

    @media (max-width: 768px) {

    // 2. PENGATURAN AWAL
    let currentPage = 1;

    function parseHarga(hargaStr) {
      return parseInt(hargaStr.replace(/[^0-9]/g, '')) || 0;
    }
    const itemsPerPage = window.innerWidth <= 768 ? 12 : 12;  

    // Fungsi membuat tombol filter kategori secara otomatis dari data produk
    function buatTombolKategori() {
      const catContainer = document.getElementById('category-container');
      const listKategori = ["Semua", ...new Set(daftarProduk.map(p => p.category).filter(Boolean))];
      catContainer.innerHTML = ""; 

      listKategori.forEach(kat => {
        const button = document.createElement('button');
        button.innerText = kat;
        button.classList.add('category-btn');
        
        if (kat === currentCategory) button.classList.add('active');

        button.addEventListener('click', () => {
          currentCategory = kat;
          currentPage = 1; 
          document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          tampilkanProduk(currentPage);
        });

        catContainer.appendChild(button);
      });
    }

      const produkDifilter = daftarProduk.filter(produk => {
        const cocokKataKunci = produk.name.toLowerCase().includes(kataKunci);
        const cocokKategori = (currentCategory === "Semua") || (produk.category === currentCategory);
        return cocokKataKunci && cocokKategori;
      });

      // Proses sortir berdasarkan harga
      produkDifilter.sort((a, b) => {
        const hargaA = parseHarga(a.price);
        const hargaB = parseHarga(b.price);
        return currentSort === 'asc' ? hargaA - hargaB : hargaB - hargaA;
      });

      const startIndex = (page - 1) * itemsPerPage;
      const endIndex = page * itemsPerPage;
      const produkHalamanIni = produkDifilter.slice(startIndex, endIndex);

      produkHalamanIni.forEach(produk => {
        container.innerHTML += `
          <div class="pricing-card">
            <div class="product-image-container">
              <img src="${produk.img}" alt="${produk.name}">
            </div>
            <div class="product-name">${produk.name}</div>
            <div class="harga-durasi">
              <span class="harga">${produk.price}</span>
              <div class="cart-container">
<button class="btn-keranjang" onclick="addToCart('${produk.name}', '${produk.price}')">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="21" r="1"></circle>
                    <circle cx="19" cy="21" r="1"></circle>
                    <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
      });

      buatTombolNavigasi(produkDifilter.length);
    }

    // Fungsi membuat navigasi halaman angka otomatis
    function buatTombolNavigasi(totalItems) {
      const paginationContainer = document.getElementById('pagination-container');
      paginationContainer.innerHTML = "";

      const totalPages = Math.ceil(totalItems / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const button = document.createElement('button');
        button.innerText = i;
        button.classList.add('page-btn');
        
        if (i === currentPage) button.classList.add('active');

        button.addEventListener('click', () => {
          currentPage = i;
          tampilkanProduk(currentPage);
          document.getElementById('tempat-produk').scrollIntoView({ behavior: 'smooth' });
        });

        paginationContainer.appendChild(button);
      }
    }

    // Kontrol Search Input
    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search');
    let timerPencarian;

    searchInput.addEventListener('input', () => {
      if (searchInput.value.length > 0) {
        clearSearchBtn.style.display = 'block';
      } else {
        clearSearchBtn.style.display = 'none';
      }

      clearTimeout(timerPencarian);
      timerPencarian = setTimeout(() => {
        currentPage = 1;
        tampilkanProduk(currentPage);
      }, 2000);
    });

    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = "";
      clearSearchBtn.style.display = 'none';
      currentPage = 1;
      tampilkanProduk(currentPage);
      searchInput.focus();
    });

    // JALANKAN SISTEM PERTAMA KALI
    buatTombolKategori(); 
    tampilkanProduk(currentPage);

function toggleSortMenu() { const m = document.getElementById('sort-menu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
function setSort(type) { currentSort = type; currentPage = 1; document.querySelectorAll('.sort-option').forEach(el => el.classList.remove('active')); event.target.classList.add('active'); toggleSortMenu(); tampilkanProduk(currentPage); }
function goHome() { document.getElementById('search-input').value = ''; document.getElementById('clear-search').style.display = 'none'; currentCategory = 'Semua'; currentPage = 1; currentSort = 'asc'; document.querySelectorAll('.category-btn').forEach(btn => { btn.classList.remove('active'); if (btn.innerText === 'Semua') btn.classList.add('active'); }); document.querySelectorAll('.sort-option').forEach(el => el.classList.remove('active')); document.querySelector('.sort-option').classList.add('active'); tampilkanProduk(currentPage); }
let cart = [];
function toggleCart() {
  document.getElementById('cart-sidebar').classList.toggle('active');
  document.getElementById('cart-overlay').classList.toggle('active');
}
function addToCart(name, price) {
  const hargaAngka = parseHarga(price);
  cart.push({ name, price: hargaAngka });
  const badge = document.getElementById('cart-badge');
  badge.innerText = cart.length;
  badge.style.display = 'flex';
  renderCart();
  alert(name + " ditambahkan ke keranjang!");
}
function renderCart() {
  const list = document.getElementById('cart-items-list');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = "";
  let total = 0;
  cart.forEach((item, index) => {
    total += item.price;
    list.innerHTML += `<div class="cart-item"><span>${item.name}</span> <span>Rp${item.price.toLocaleString()}</span></div>`;
  });
  totalEl.innerText = "Total: Rp" + total.toLocaleString();
}
  </script>
